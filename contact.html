<style>
body,h1 {font-family: "Raleway", Arial, sans-serif}
h1 {letter-spacing: 6px}
.w3-row-padding img {margin-bottom: 12px}
/* Custom CSS for the form labels and input fields */
.form-group label,
.form-group input,

  font-size: 16px;
}

/* Custom CSS for the form container */
.w3-card {

/* Custom CSS for the submit button */

  /* Add margin for the h2 "Get In Touch" */

<!-- !PAGE CONTENT! -->
<div class="w3-content" style="max-width:1500px">

<header class="w3-panel w3-center " style="padding:80px 16px">

<!-- Icon and Contact header with color -->
<div style="font-size: 24px; margin-bottom: 20px; text-align: center;">
  <i class="fas fa-envelope" style="color: #2196F3;"></i> <!-- Add the envelope icon with color -->
  <h2 style="display: inline-block; margin-left: 10px;">Contact</h2>
</div>

<!-- Container for center alignment -->
<div style="display: flex; justify-content: center;">
  <!-- Email and Location Information -->
  <div style="text-align: left; margin-bottom: 20px; font-size: 17px;">
    <p><i class="fas fa-map-marker-alt" style="color: red; margin-right: 10px;"></i> Selangor, Malaysia</p>
    <p><i class="fas fa-envelope" style="color: blue; margin-right: 10px;"></i> muhdzahir248@gmail.com</p>
    <p><i class="fas fa-phone" style="color: green; margin-right: 10px;"></i> +60 149947806</p>
  </div>
</div>





<!-- Contact Section-->
<div class="w3-content w3-justify w3-hover-text-black w3-padding-32 w3-auto w3-row-padding w3-center" id="contact" style="margin-bottom: 50px">    
    <div class="w3-card w3-padding w3-round-large" style="max-width: 500px; margin: 0 auto;">
        <form action="https://formspree.io/f/mrgwbaey" method="POST">
            <h2 class="get-in-touch-heading" style="font-size: 22px; text-align: justify;">Get In Touch With Me</h2>

            <div class="form-group" style="margin-bottom: 10px;">
                <input type="email" class="form-control form-text" id="email" name="email" placeholder="Enter email" required style="width: 100%;">
            </div>

            <div class="form-group" style="margin-bottom: 10px;">
                <input type="text" class="form-control form-text" id="name" name="name" placeholder="Your name" required style="width: 100%;">
            </div>

            <div class="form-group" style="margin-bottom: 10px;">
                <textarea class="form-control form-text" id="message" name="message" rows="5" placeholder="Message" required style="width: 100%;"></textarea>
            </div>

            <button type="submit" class="btn btn-primary btn-form rounded-button" style="background-color: #2196F3; color: white; border: 2px solid #2196F3;">Send Message</button>
          </form>
    </div>
</div>
