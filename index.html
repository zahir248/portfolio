  <script>
    const headerText = [
      "Hello!",
      "வணக்கம்!",
      "你好!",
    ];
  
    let currentTextIndex = 0;
    let currentCharIndex = 0;
    let isCursorVisible = true;
    const typingHeader = document.getElementById("typing-header");
  
    function type() {
  if (currentCharIndex < headerText[currentTextIndex].length) {
    let currentText = headerText[currentTextIndex].substring(0, currentCharIndex + 1);
    let textColor = '';

    switch (currentTextIndex) {
      case 0:
        textColor = 'green';
        break;
      case 1:
        textColor = 'blue';
        break;
      case 2:
        textColor = 'red';
        break;
      default:
        textColor = 'white'; // Default color
    }

    typingHeader.innerHTML =
      `<span style="color: ${textColor};">${currentText}</span>` +
      (isCursorVisible ? "|" : "&nbsp;"); // Use &nbsp; for non-breaking space

    isCursorVisible = !isCursorVisible;
    currentCharIndex++;
    setTimeout(type, 100); // Adjust typing speed (in milliseconds)
  } else {
    setTimeout(erase, 2000); // Wait before erasing
  }
}

  
    function erase() {
      if (currentCharIndex > 0) {
        typingHeader.innerHTML =
          headerText[currentTextIndex].substring(0, currentCharIndex - 1) +
          (isCursorVisible ? "|" : "&nbsp;");
        isCursorVisible = !isCursorVisible;
        currentCharIndex--;
        setTimeout(erase, 50); // Adjust erasing speed (in milliseconds)
      } else {
        currentTextIndex = (currentTextIndex + 1) % headerText.length;
        setTimeout(type, 500); // Wait before typing the next phrase
      }
    }
  
    document.addEventListener("DOMContentLoaded", function () {
      setTimeout(type, 1000); // Start typing after 1 second
    });
  </script>
